<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Agro Scanner</title>
<style>
    * {
        box-sizing: border-box;
    }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #1e1e2f;
        color: #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 15px;
        margin: 0;
        min-height: 100vh;
    }
    h1 {
        margin-bottom: 5px;
        font-size: 1.6rem;
        text-align: center;
    }
    p.subtitle {
        color: #a0a0b8;
        margin-top: 0;
        margin-bottom: 20px;
        text-align: center;
    }
    #webcam-container {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        background: #000;
        min-height: 200px;
        min-width: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #webcam-container canvas {
        display: block;
    }
    .controls {
        display: flex;
        gap: 12px;
        margin: 20px 0;
        flex-wrap: wrap;
        justify-content: center;
    }
    button {
        background: #6c5ce7;
        color: white;
        border: none;
        padding: 12px 22px;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
    }
    button:hover {
        background: #5a4bd1;
    }
    button:active {
        transform: scale(0.97);
    }
    button:disabled {
        background: #444;
        cursor: not-allowed;
    }
    #label-container {
        width: 100%;
        max-width: 400px;
        margin-top: 10px;
    }
    .label-row {
        display: flex;
        justify-content: space-between;
        background: #2a2a40;
        padding: 10px 15px;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 0.95rem;
    }
    .label-row .bar-bg {
        flex: 1;
        background: #3a3a55;
        border-radius: 6px;
        margin: 0 10px;
        overflow: hidden;
        height: 10px;
        align-self: center;
    }
    .label-row .bar-fill {
        height: 100%;
        background: #6c5ce7;
    }
    #status {
        margin-top: 15px;
        color: #a0a0b8;
        font-size: 0.9rem;
        text-align: center;
    }
    #soil-info {
        width: 100%;
        max-width: 400px;
        margin-top: 20px;
        background: #262640;
        border: 1px solid #3a3a55;
        border-radius: 10px;
        padding: 16px 18px;
        display: none;
    }
    #soil-info.visible {
        display: block;
    }
    #soil-info h3 {
        margin: 0 0 4px 0;
        color: #a29bfe;
        font-size: 1.1rem;
    }
    #soil-info p.soil-desc {
        margin: 0 0 10px 0;
        color: #c8c8dc;
        font-size: 0.9rem;
    }
    #soil-info .crop-title {
        font-weight: bold;
        margin-bottom: 8px;
        color: #f0f0f0;
        font-size: 0.95rem;
    }
    #soil-info .crop-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px 12px;
        list-style: none;
        margin: 0;
        padding: 0;
    }
    #soil-info .crop-list li {
        background: #34345a;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 0.88rem;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    #soil-info .crop-list li::before {
        content: "🌱";
        font-size: 0.9rem;
    }
</style>
</head>
<body>

<h1>Smart Agro Scanner</h1>
<p class="subtitle">Start the camera, point it at something, and see the live predictions below.</p>

<div class="controls">
    <button id="start-btn">Start Camera</button>
    <button id="flip-btn" disabled>Flip Camera</button>
    <button id="stop-btn" disabled>Stop Camera</button>
</div>

<div id="webcam-container"></div>

<div id="label-container"></div>

<div id="soil-info">
    <h3 id="soil-name"></h3>
    <p class="soil-desc" id="soil-desc"></p>
    <div class="crop-title">Recommended crops:</div>
    <ul class="crop-list" id="crop-list"></ul>
</div>

<div id="status">Camera is off</div>

<!-- TensorFlow.js and Teachable Machine libraries -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
    // Link to your Teachable Machine model
    const URL = "https://teachablemachine.withgoogle.com/models/haqDXbbzJ/";

    // Information about each soil type: description + recommended crops
    // Add more soil types here as needed (key must match the model's class name)
    const soilInfo = {
        "Tanah Liat": {
            description: "Tanah liat bertekstur padat, menyimpan air dan nutrien dengan baik, sesuai untuk tanaman berakar dalam.",
            crops: ["Mangga", "Nangka", "Kangkung", "Keledek", "Halia"]
        }
    };

    const soilInfoBox = document.getElementById("soil-info");
    const soilNameEl = document.getElementById("soil-name");
    const soilDescEl = document.getElementById("soil-desc");
    const cropListEl = document.getElementById("crop-list");

    // Find soil info by matching the predicted class name (case-insensitive)
    function findSoilInfo(className) {
        const key = Object.keys(soilInfo).find(
            k => k.toLowerCase() === className.toLowerCase()
        );
        return key ? soilInfo[key] : null;
    }

    function showSoilInfo(className) {
        const info = findSoilInfo(className);
        if (!info) {
            soilInfoBox.classList.remove("visible");
            return;
        }
        soilNameEl.innerText = className;
        soilDescEl.innerText = info.description;
        cropListEl.innerHTML = "";
        info.crops.forEach(crop => {
            const li = document.createElement("li");
            li.innerText = crop;
            cropListEl.appendChild(li);
        });
        soilInfoBox.classList.add("visible");
    }

    let model, webcam, labelContainer, maxPredictions;
    let currentFacingMode = "user"; // "user" = front camera, "environment" = back camera
    let isRunning = false;
    let animationId;

    const startBtn = document.getElementById("start-btn");
    const flipBtn = document.getElementById("flip-btn");
    const stopBtn = document.getElementById("stop-btn");
    const statusEl = document.getElementById("status");
    const webcamContainer = document.getElementById("webcam-container");

    startBtn.addEventListener("click", () => init());
    flipBtn.addEventListener("click", () => flipCamera());
    stopBtn.addEventListener("click", () => stopCamera());

    // Load the model once, reuse it every time
    async function loadModel() {
        if (model) return;
        statusEl.innerText = "Loading model...";
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();
    }

    async function init() {
        try {
            startBtn.disabled = true;
            statusEl.innerText = "Requesting camera access...";

            await loadModel();

            const flip = true; // mirror the front camera
            const width = 400;
            const height = 400;

            webcam = new tmImage.Webcam(width, height, flip);
            await webcam.setup({ facingMode: currentFacingMode });
            await webcam.play();

            isRunning = true;
            animationId = window.requestAnimationFrame(loop);

            webcamContainer.innerHTML = "";
            webcamContainer.appendChild(webcam.canvas);

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const row = document.createElement("div");
                row.className = "label-row";
                row.innerHTML = `
                    <span class="label-name">-</span>
                    <div class="bar-bg"><div class="bar-fill" style="width:0%"></div></div>
                    <span class="label-percent">0%</span>
                `;
                labelContainer.appendChild(row);
            }

            flipBtn.disabled = false;
            stopBtn.disabled = false;
            statusEl.innerText = "Camera running (" + (currentFacingMode === "user" ? "Front" : "Back") + " camera)";
        } catch (err) {
            console.error(err);
            statusEl.innerText = "Could not access camera: " + err.message;
            startBtn.disabled = false;
        }
    }

    async function loop() {
        if (!isRunning) return;
        webcam.update();
        await predict();
        animationId = window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        const rows = labelContainer.getElementsByClassName("label-row");

        let topPrediction = prediction[0];

        for (let i = 0; i < maxPredictions; i++) {
            const p = prediction[i];
            const percent = Math.round(p.probability * 100);
            const row = rows[i];
            row.querySelector(".label-name").innerText = p.className;
            row.querySelector(".label-percent").innerText = percent + "%";
            row.querySelector(".bar-fill").style.width = percent + "%";

            if (p.probability > topPrediction.probability) {
                topPrediction = p;
            }
        }

        // Only show soil info when the model is reasonably confident
        if (topPrediction.probability >= 0.6) {
            showSoilInfo(topPrediction.className);
        } else {
            soilInfoBox.classList.remove("visible");
        }
    }

    async function flipCamera() {
        flipBtn.disabled = true;
        statusEl.innerText = "Switching camera...";

        // stop current webcam stream
        if (webcam) {
            webcam.stop();
        }
        isRunning = false;
        if (animationId) cancelAnimationFrame(animationId);

        // toggle facing mode
        currentFacingMode = currentFacingMode === "user" ? "environment" : "user";

        try {
            const flip = currentFacingMode === "user"; // mirror only front camera
            const width = 400;
            const height = 400;

            webcam = new tmImage.Webcam(width, height, flip);
            await webcam.setup({ facingMode: currentFacingMode });
            await webcam.play();

            webcamContainer.innerHTML = "";
            webcamContainer.appendChild(webcam.canvas);

            isRunning = true;
            animationId = window.requestAnimationFrame(loop);

            statusEl.innerText = "Camera running (" + (currentFacingMode === "user" ? "Front" : "Back") + " camera)";
        } catch (err) {
            console.error(err);
            statusEl.innerText = "Could not switch camera: " + err.message;
        } finally {
            flipBtn.disabled = false;
        }
    }

    function stopCamera() {
        isRunning = false;
        if (animationId) cancelAnimationFrame(animationId);
        if (webcam) {
            webcam.stop();
        }
        webcamContainer.innerHTML = "";
        if (labelContainer) labelContainer.innerHTML = "";
        soilInfoBox.classList.remove("visible");
        statusEl.innerText = "Camera is off";
        startBtn.disabled = false;
        flipBtn.disabled = true;
        stopBtn.disabled = true;
    }
</script>

</body>
</html>
