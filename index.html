<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Agro Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #1a2f1a; color: #fff; text-align: center; padding: 15px; }
        h1 { color: #8dd39e; margin-bottom: 15px; font-size: 24px; }
        .container { max-width: 700px; margin: 0 auto; }
        #webcam-container { width: 100%; max-width: 640px; height: auto; border-radius: 12px; overflow: hidden; border: 3px solid #4a9f5a; margin: 15px auto; background: #222; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        video, canvas { width: 100%; height: auto; transform: scaleX(-1); object-fit: cover; }
        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 15px 0; }
        button { padding: 12px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #startBtn { background: #4a9f5a; color: white; }
        #switchBtn { background: #2980b9; color: white; }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.7; }
        button:hover:not(:disabled) { transform: translateY(-2px); }
        #label-container { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 10px; text-align: left; }
        .prediction { padding: 8px; margin: 5px 0; border-radius: 6px; background: rgba(74,159,90,0.2); }
        .confidence { float: right; font-weight: bold; color: #8dd39e; }
        .note { margin-top: 20px; font-size: 14px; color: #bbb; line-height: 1.5; }
        .error { color: #ff6b6b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 Smart Agro Scanner</h1>
        <div id="webcam-container">
            <p style="padding: 20px;">Click "Start Camera" to begin scanning</p>
        </div>
        <div class="controls">
            <button id="startBtn" onclick="init()">Start Camera & Scan</button>
            <button id="switchBtn" onclick="switchCamera()" disabled>Switch Front/Back Camera</button>
        </div>
        <div id="label-container">Loading model...</div>
        <p class="note">
            ✅ Use <b>Chrome</b> or <b>Safari</b> only<br>
            ✅ Allow camera permission when asked<br>
            ✅ Must be opened via HTTPS or localhost<br>
            ✅ Close other apps using camera first
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/haqDXbbzJ/";
        let model, webcam, maxPredictions;
        let currentFacingMode = "environment";
        let isRunning = false;

        async function init() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("Your browser does not support camera access. Please use Chrome or Safari.");
                }

                document.getElementById("startBtn").disabled = true;
                document.getElementById("label-container").innerHTML = "🔄 Loading AI model...";
                
                const modelURL = MODEL_URL + "model.json";
                const metadataURL = MODEL_URL + "metadata.json";
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                await setupWebcam();

                document.getElementById("switchBtn").disabled = false;
                document.getElementById("label-container").innerHTML = "✅ Ready! Scanning...";
                isRunning = true;
                window.requestAnimationFrame(predict);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById("label-container").innerHTML = `<div class="error">❌ Error: ${error.message}<br>Check permission, use Chrome/Safari, and ensure HTTPS/localhost.</div>`;
                document.getElementById("startBtn").disabled = false;
            }
        }

        async function setupWebcam() {
            if (webcam) {
                webcam.stop();
                const container = document.getElementById("webcam-container");
                container.innerHTML = "";
            }

            const flip = currentFacingMode === "user";
            webcam = new tmImage.Webcam(640, 480, flip, { 
                facingMode: currentFacingMode,
                width: { ideal: 640 },
                height: { ideal: 480 }
            });
            
            await webcam.setup();
            await webcam.play();
            
            const container = document.getElementById("webcam-container");
            container.appendChild(webcam.canvas);
        }

        async function switchCamera() {
            if (!isRunning) return;
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            await setupWebcam();
        }

        async function predict() {
            if (!webcam || !model) return;
            const prediction = await model.predict(webcam.canvas);
            const labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "<h3>📊 Scanning Results:</h3>";

            prediction.sort((a, b) => b.probability - a.probability);

            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className || "Unknown";
                const probability = (prediction[i].probability * 100).toFixed(1);
                
                labelContainer.innerHTML += `
                    <div class="prediction">
                        ${className}
                        <span class="confidence">${probability}%</span>
                    </div>
                `;
            }

            window.requestAnimationFrame(predict);
        }
    </script>
</body>
</html>
