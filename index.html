<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scan Agro</title>

    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

    <!-- Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f9f4;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        header {
            background: #2E7D32;
            color: white;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .container {
            margin-top: 30px;
        }

        button {
            background: #43A047;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2E7D32;
        }

        #webcam-container {
            margin-top: 20px;
        }

        canvas {
            border: 5px solid #2E7D32;
            border-radius: 10px;
        }

        #label-container {
            margin-top: 20px;
            width: 320px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
            font-size: 18px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.2);
        }

        #label-container div {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        footer {
            margin-top: 30px;
            padding: 15px;
            background: #2E7D32;
            color: white;
        }
    </style>
</head>

<body>

<header>
    🌱 Smart Scan Agro
</header>

<div class="container">

    <h2>Sistem Pengesanan Tanaman Menggunakan AI</h2>

    <p>Tekan butang di bawah untuk mengaktifkan kamera.</p>

    <button onclick="init()">📷 Mulakan Kamera</button>

    <div id="webcam-container"></div>

    <div id="label-container"></div>

</div>

<footer>
    Smart Scan Agro © 2026
</footer>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/haqDXbbzJ/";

let model, webcam, labelContainer, maxPredictions;

async function init() {

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);

    maxPredictions = model.getTotalClasses();

    webcam = new tmImage.Webcam(320, 320, true);

    await webcam.setup();

    await webcam.play();

    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");

    labelContainer.innerHTML = "";

    for (let i = 0; i < maxPredictions; i++) {
        labelContainer.appendChild(document.createElement("div"));
    }
}

async function loop() {

    webcam.update();

    await predict();

    window.requestAnimationFrame(loop);

}

async function predict() {

    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < maxPredictions; i++) {

        const probability = (prediction[i].probability * 100).toFixed(2);

        labelContainer.childNodes[i].innerHTML =
            "<b>" + prediction[i].className + "</b> : " +
            probability + "%";

    }

}

</script>

</body>
</html>
